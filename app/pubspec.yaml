name: triplesapp
description: "Basketball app - encontrá tu próxima cancha."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.10.0
  google_maps_flutter_android: 2.19.7  # 2.19.8 migró a Kotlin Pigeon y rompe el build (cannot find symbol PlatformPolygon)
  google_maps_flutter_platform_interface: any
  http: ^1.2.0
  geolocator: ^13.0.0
  android_alarm_manager_plus: ^4.0.4
  battery_plus: ^6.0.0
  shared_preferences: ^2.3.0
  crypto: ^3.0.3
  provider: ^6.1.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.0.0
  native_geofence: ^1.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
